<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>光光 · 隙光樹洞 | space-between.art</title>
    <meta name="description" content="光光是書店裡的暖場店員。你唔使準備好先嚟，坐低就好。24小時，不評判，慢慢嚟。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0F0D0A;--bg2:#17140F;--bg3:#1D1A14;
            --t:#F5F2EA;--tb:#E8E3D8;--tm:#C4BDA8;--tq:#9A937F;
            --gold:#C9A55A;--gs:#B8926A;--gl:rgba(201,165,90,.15);--gg:rgba(201,165,90,.06);
            --glow:rgba(201,165,90,.03);
            --sf:'Noto Serif TC',serif;--sn:'Noto Sans TC',sans-serif;--en:'Cormorant Garamond',serif;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden}
        body{background:var(--bg);color:var(--tb);font-family:var(--sf);-webkit-font-smoothing:antialiased}
        ::selection{background:rgba(201,165,90,.3);color:#fff}
        a{color:inherit;text-decoration:none}

        /* LAYOUT */
        .app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden}
        #fireflies{position:fixed;inset:0;pointer-events:none;z-index:0}

        /* NAV */
        .nav{position:relative;z-index:10;background:rgba(15,13,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--gl);height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .nav-back{font-family:var(--sn);font-size:11px;color:var(--tq);letter-spacing:1px;transition:color .3s;display:flex;align-items:center;gap:6px}
        .nav-back:hover{color:var(--gold)}
        .nav-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px}
        .nav-av{width:28px;height:28px;border-radius:50%;background:rgba(201,165,90,.12);border:1px solid rgba(201,165,90,.2);display:flex;align-items:center;justify-content:center;font-size:14px}
        .nav-name{font-family:var(--sn);font-size:13px;font-weight:500;color:var(--t);letter-spacing:1px}
        .nav-status{font-family:var(--sn);font-size:10px;color:var(--gs);letter-spacing:1px}
        .nav-right{font-family:var(--sn);font-size:11px;color:var(--tq)}

        /* WELCOME */
        .welcome{text-align:center;padding:48px 24px 20px;flex-shrink:0;position:relative;z-index:1}
        .welcome-av{width:64px;height:64px;border-radius:50%;background:rgba(201,165,90,.08);border:1px solid rgba(201,165,90,.15);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;animation:pulse-soft 3s infinite}
        .welcome h2{font-size:20px;font-weight:600;color:var(--t);margin-bottom:4px}
        .welcome-en{font-family:var(--en);font-size:13px;font-style:italic;color:var(--tq);margin-bottom:12px;letter-spacing:2px}
        .welcome-desc{font-size:14px;line-height:2.2;color:var(--tb);max-width:360px;margin:0 auto}
        .welcome-desc em{color:var(--gold);font-style:normal}

        /* MESSAGES */
        .messages{flex:1;overflow-y:auto;padding:16px 16px 8px;position:relative;z-index:1;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
        .messages::-webkit-scrollbar{width:3px}
        .messages::-webkit-scrollbar-track{background:transparent}
        .messages::-webkit-scrollbar-thumb{background:rgba(201,165,90,.1);border-radius:2px}
        .msg{display:flex;gap:10px;margin-bottom:16px;animation:msg-in .4s ease-out both;max-width:600px}
        .msg-ai{align-self:flex-start}
        .msg-user{flex-direction:row-reverse;margin-left:auto}
        .msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
        .msg-ai .msg-av{background:rgba(201,165,90,.1);border:1px solid rgba(201,165,90,.15)}
        .msg-user .msg-av{background:rgba(160,160,160,.08);border:1px solid rgba(160,160,160,.1)}
        .msg-bubble{padding:14px 18px;border-radius:16px;font-family:var(--sn);font-size:15px;line-height:1.9;max-width:min(420px,75vw);word-break:break-word}
        .msg-ai .msg-bubble{background:var(--bg2);border:1px solid var(--gl);border-top-left-radius:4px;color:var(--t)}
        .msg-user .msg-bubble{background:rgba(201,165,90,.1);border:1px solid rgba(201,165,90,.12);border-top-right-radius:4px;color:var(--t)}

        /* TYPING INDICATOR */
        .typing{display:none;gap:10px;margin-bottom:16px;align-items:flex-end}
        .typing.show{display:flex}
        .typing .msg-av{width:28px;height:28px;border-radius:50%;background:rgba(201,165,90,.1);border:1px solid rgba(201,165,90,.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .typing-dots{padding:12px 18px;background:var(--bg2);border:1px solid var(--gl);border-radius:16px;border-top-left-radius:4px;display:flex;gap:4px;align-items:center}
        .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--gs);animation:dot-pulse 1.4s infinite}
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}

        /* SUGGESTIONS */
        .suggestions{padding:4px 16px 8px;display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1;flex-shrink:0}
        .sug{font-family:var(--sn);font-size:13px;color:var(--tm);background:var(--gg);border:1px solid var(--gl);padding:8px 18px;border-radius:20px;cursor:pointer;transition:all .3s;white-space:nowrap}
        .sug:hover{background:rgba(201,165,90,.12);color:var(--gold);transform:translateY(-1px)}

        /* INPUT */
        .input-area{position:relative;z-index:10;padding:8px 16px 16px;background:linear-gradient(to top,var(--bg) 70%,transparent);flex-shrink:0}
        .input-wrap{display:flex;gap:10px;align-items:flex-end;max-width:600px;margin:0 auto}
        .input-field{flex:1;background:var(--bg2);border:1px solid var(--gl);border-radius:20px;padding:11px 18px;font-family:var(--sn);font-size:15px;color:var(--t);line-height:1.6;resize:none;outline:none;transition:border-color .3s;max-height:120px;overflow-y:auto;min-height:42px}
        .input-field::placeholder{color:var(--tm)}
        .input-field:focus{border-color:rgba(201,165,90,.3)}
        .send-btn{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;color:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(201,165,90,.3)}
        .send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

        /* FOOTER */
        .foot-note{text-align:center;padding:4px 16px 12px;position:relative;z-index:1;flex-shrink:0}
        .foot-note span{font-family:var(--sn);font-size:10px;color:var(--tq);letter-spacing:1px}

        /* RESPONSIVE */
        @media(max-width:480px){
            .welcome{padding:32px 20px 12px}
            .welcome-av{width:52px;height:52px;font-size:26px}
            .welcome h2{font-size:18px}
            .welcome-desc{font-size:13px}
            .messages{padding:12px 12px 8px}
            .msg-bubble{font-size:14px;max-width:85vw}
            .input-area{padding:6px 12px 12px}
            .suggestions{padding:4px 12px 6px}
        }

        /* ENV SAFE: hide welcome after first message */
        .app.chatting .welcome{display:none}
        .app.chatting .suggestions{display:none}

        @keyframes pulse-soft{0%,100%{box-shadow:0 0 0 0 rgba(201,165,90,0)}50%{box-shadow:0 0 20px 4px rgba(201,165,90,.08)}}
        @keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes dot-pulse{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
    </style>
</head>
<body>

<div class="app" id="app">
    <canvas id="fireflies"></canvas>

    <!-- NAV -->
    <nav class="nav">
        <a href="../" class="nav-back">← 書架</a>
        <div class="nav-center">
            <div class="nav-av">✨</div>
            <div>
                <div class="nav-name">光光</div>
                <div class="nav-status">online · 樹洞模式</div>
            </div>
        </div>
        <div class="nav-right">24h</div>
    </nav>

    <!-- WELCOME -->
    <div class="welcome" id="welcome">
        <div class="welcome-av">✨</div>
        <h2>光光</h2>
        <div class="welcome-en">Guangguang · Soul Companion</div>
        <div class="welcome-desc">
            書店裡嘅暖場店員。<br>
            你唔使準備好先嚟，<em>坐低就好</em>。<br>
            呢度係樹洞——講咩都得，<em>不評判</em>。
        </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages"></div>

    <!-- TYPING INDICATOR -->
    <div class="typing" id="typing">
        <div class="msg-av">✨</div>
        <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <!-- SUGGESTIONS -->
    <div class="suggestions" id="suggestions">
        <div class="sug" onclick="sendSuggestion(this)">最近覺得好累</div>
        <div class="sug" onclick="sendSuggestion(this)">唔知自己想做咩</div>
        <div class="sug" onclick="sendSuggestion(this)">想傾下品牌嘅嘢</div>
        <div class="sug" onclick="sendSuggestion(this)">有啲迷茫</div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <div class="input-wrap">
            <textarea class="input-field" id="input" rows="1" placeholder="同光光講⋯⋯" enterkeyhint="send"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()" disabled aria-label="傳送">↑</button>
        </div>
    </div>

    <div class="foot-note">
        <span>光光由 AI 驅動 · 不替代專業諮詢</span>
    </div>
</div>

<script>
(function(){
    // ═══ FIREFLIES ═══
    const cv=document.getElementById('fireflies'),cx=cv.getContext('2d');
    function resizeCanvas(){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight}
    resizeCanvas();window.addEventListener('resize',resizeCanvas);
    const flies=[];for(let i=0;i<25;i++)flies.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.2,dy:(Math.random()-.5)*.15,o:Math.random()*.04+.01,phase:Math.random()*Math.PI*2});
    let t=0;
    function drawFlies(){cx.clearRect(0,0,cv.width,cv.height);t+=.005;flies.forEach(f=>{const flicker=Math.sin(t*2+f.phase)*.5+.5;const o=f.o*(.6+flicker*.4);cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);cx.fillStyle=`rgba(201,165,90,${o})`;cx.fill();cx.beginPath();cx.arc(f.x,f.y,f.r*4,0,Math.PI*2);cx.fillStyle=`rgba(201,165,90,${o*.15})`;cx.fill();f.x+=f.dx;f.y+=f.dy;if(f.x<-10)f.x=cv.width+10;if(f.x>cv.width+10)f.x=-10;if(f.y<-10)f.y=cv.height+10;if(f.y>cv.height+10)f.y=-10});requestAnimationFrame(drawFlies)}
    drawFlies();

    // ═══ STATE ═══
    const API='https://spacebetween.app.n8n.cloud/webhook/healing-chat';
    let history=[];
    let sending=false;

    const app=document.getElementById('app');
    const msgBox=document.getElementById('messages');
    const input=document.getElementById('input');
    const sendBtn=document.getElementById('sendBtn');
    const typingEl=document.getElementById('typing');

    // ═══ AUTO-RESIZE TEXTAREA ═══
    input.addEventListener('input',function(){
        this.style.height='auto';
        this.style.height=Math.min(this.scrollHeight,120)+'px';
        sendBtn.disabled=!this.value.trim()||sending;
    });
    input.addEventListener('keydown',function(e){
        if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
    });

    // ═══ ADD MESSAGE TO UI ═══
    function addMsg(role,text){
        const isAI=role==='ai';
        const div=document.createElement('div');
        div.className='msg msg-'+(isAI?'ai':'user');
        div.innerHTML=`
            <div class="msg-av">${isAI?'✨':'👤'}</div>
            <div class="msg-bubble">${formatText(text)}</div>
        `;
        msgBox.appendChild(div);
        msgBox.scrollTop=msgBox.scrollHeight;
    }

    function formatText(text){
        return text
            .replace(/\n/g,'<br>')
            .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--t)">$1</strong>')
            .replace(/\*(.*?)\*/g,'<em style="color:var(--gold)">$1</em>');
    }

    // ═══ SEND ═══
    window.send=async function(){
        const text=input.value.trim();
        if(!text||sending)return;

        sending=true;
        sendBtn.disabled=true;
        input.value='';
        input.style.height='auto';

        // First message: switch to chat mode
        if(!app.classList.contains('chatting'))app.classList.add('chatting');

        // Add user msg
        addMsg('user',text);
        history.push({role:'user',content:text});

        // Show typing
        typingEl.classList.add('show');
        msgBox.scrollTop=msgBox.scrollHeight;

        try{
            const res=await fetch(API,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messages:history})
            });

            if(!res.ok)throw new Error('API error '+res.status);

            const data=await res.json();
            let reply='';

            // Handle multiple response formats
            if(data.content&&Array.isArray(data.content)){
                reply=data.content.filter(c=>c.type==='text').map(c=>c.text).join('\n');
            }else if(data.reply){
                reply=data.reply;
            }else if(data.text){
                reply=data.text;
            }else if(typeof data==='string'){
                reply=data;
            }else{
                reply=JSON.stringify(data);
            }

            // Strip summary markers (internal use only)
            reply=reply.replace(/---SUMMARY_START---[\s\S]*?---SUMMARY_END---/g,'').trim();

            if(!reply)reply='抱歉，我而家收唔到訊號 😔 可以再講多一次嗎？';

            history.push({role:'assistant',content:reply});
            typingEl.classList.remove('show');
            addMsg('ai',reply);

        }catch(err){
            console.error('Chat error:',err);
            typingEl.classList.remove('show');
            addMsg('ai','網絡好似唔太穩定 😔 等陣再試下？');
        }

        sending=false;
        sendBtn.disabled=!input.value.trim();
        input.focus();
    };

    // ═══ SUGGESTION ═══
    window.sendSuggestion=function(el){
        input.value=el.textContent;
        input.dispatchEvent(new Event('input'));
        send();
    };

    // Focus input on load (desktop)
    if(window.innerWidth>768)input.focus();

})();
</script>
</body>
</html>
